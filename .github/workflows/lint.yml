name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.3.0

      - name: Run ruff check
        run: ruff check city_factory/ api/ core/ tests/ deploy/

      - name: Run ruff format check
        run: ruff format --check city_factory/ api/ core/ tests/ deploy/

  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install black
        run: pip install black>=24.0.0

      - name: Run black check
        run: black --check --diff city_factory/ api/ core/ tests/ deploy/
