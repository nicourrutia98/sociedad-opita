name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        # Camino B: coverage corre directamente, no via pytest-cov, para
        # evitar incompatibilidades entre pytest-cov 5+ (que requiere
        # `display_covered` de coverage 7.1+) y coverage 6.x.
        # La lista de modulos se toma del pyproject.toml [tool.coverage.run].
        # Ver pyproject.toml dev-deps para mas detalle.
        run: |
          coverage run --source=city_factory,analysis,experimentos,geo_tello,motor_simulacion,multi_client,prompt_builder,reloj,experimento,simulacion_v3_geografica -m pytest tests/ -v
          coverage report -m
          coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
